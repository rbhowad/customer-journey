<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shory Admin — Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 50%, #2563eb 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* ── Card ── */
        .login-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 32px 80px rgba(0,0,0,0.45);
            width: 100%;
            max-width: 420px;
            overflow: hidden;
        }

        /* ── Card header ── */
        .login-card-header {
            background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 40%, #2563eb 100%);
            padding: 32px 36px 28px;
            color: white;
            text-align: center;
        }

        .login-logo {
            width: 48px; height: 48px;
            background: rgba(255,255,255,0.15);
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 16px;
            font-size: 1.5em;
        }

        .login-title {
            font-size: 1.3em;
            font-weight: 700;
            letter-spacing: -0.3px;
        }

        .login-subtitle {
            font-size: 0.78em;
            opacity: 0.6;
            margin-top: 5px;
        }

        /* ── Form body ── */
        .login-body {
            padding: 32px 36px 36px;
        }

        .field-group {
            margin-bottom: 18px;
        }

        .field-group label {
            display: block;
            font-size: 0.78em;
            font-weight: 600;
            color: #475569;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 7px;
        }

        .field-group input {
            width: 100%;
            padding: 11px 14px;
            border: 1.5px solid #e2e8f0;
            border-radius: 8px;
            font-size: 0.92em;
            font-family: inherit;
            color: #1e293b;
            background: #f8fafc;
            transition: all 0.2s;
            outline: none;
        }

        .field-group input:focus {
            border-color: #2563eb;
            background: white;
            box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
        }

        .field-group input::placeholder {
            color: #94a3b8;
        }

        /* ── Error / info messages ── */
        .msg {
            display: none;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 0.82em;
            font-weight: 500;
            margin-bottom: 18px;
            line-height: 1.45;
        }

        .msg.error {
            display: block;
            background: #fee2e2;
            color: #dc2626;
            border: 1px solid #fca5a5;
        }

        .msg.locked {
            display: block;
            background: #fef9c3;
            color: #92400e;
            border: 1px solid #fde68a;
        }

        /* ── Submit button ── */
        .btn-login {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #1e3a5f, #2563eb);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 0.95em;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
            letter-spacing: 0.2px;
        }

        .btn-login:hover { opacity: 0.92; }
        .btn-login:active { transform: scale(0.99); }

        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* ── Loading spinner inside button ── */
        .btn-login .spinner {
            display: inline-block;
            width: 14px; height: 14px;
            border: 2px solid rgba(255,255,255,0.4);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.65s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Footer ── */
        .login-footer {
            text-align: center;
            padding-top: 20px;
            font-size: 0.72em;
            color: #94a3b8;
        }
    </style>
</head>
<body>

<div class="login-card">
    <div class="login-card-header">
        <div class="login-logo">&#128274;</div>
        <div class="login-title">Shory Admin Portal</div>
        <div class="login-subtitle">CX Dashboard &amp; Dev Insights</div>
    </div>

    <div class="login-body">
        <div class="msg" id="loginMsg"></div>

        <form id="loginForm" onsubmit="submitLogin(event)">
            <div class="field-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email"
                    placeholder="Enter your email"
                    autocomplete="email" required autofocus />
            </div>

            <div class="field-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password"
                    placeholder="Enter your password"
                    autocomplete="current-password" required />
            </div>

            <button class="btn-login" type="submit" id="loginBtn">Sign In</button>
        </form>

        <div class="login-footer">Shory Motor Admin &mdash; Internal use only</div>
    </div>
</div>

<script>
    var IDENTITY_URL = 'https://identity-dev.shory.com/api';

    // If already logged in, go straight to the dashboard
    (function() {
        var token = sessionStorage.getItem('adminToken');
        if (token && !isTokenExpired(token)) {
            window.location.href = 'CustomerRoadmap.html';
        }
    })();

    function isTokenExpired(token) {
        try {
            var payload = JSON.parse(atob(token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/')));
            return payload.exp && payload.exp < Math.floor(Date.now() / 1000);
        } catch (_) {
            return true;
        }
    }

    async function submitLogin(e) {
        e.preventDefault();

        var btn      = document.getElementById('loginBtn');
        var msgEl    = document.getElementById('loginMsg');
        var email    = document.getElementById('email').value.trim();
        var password = document.getElementById('password').value;

        // Reset message
        msgEl.className = 'msg';
        msgEl.textContent = '';

        // Loading state
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span>Signing in&hellip;';

        try {
            var resp = await fetch(IDENTITY_URL + '/user/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'accept': 'application/json' },
                body: JSON.stringify({ email: email, password: password })
            });

            if (resp.status === 401 || resp.status === 400) {
                showError('Invalid email or password.');
                return;
            }

            if (!resp.ok) {
                showError('Login failed. Please try again.');
                return;
            }

            var data = await resp.json();
            var token        = data.data && data.data.token;
            var refreshToken = data.data && data.data.refreshToken;

            if (!token) {
                showError('Unexpected response from server. Please try again.');
                return;
            }

            // Decode name/email from JWT for header display
            var displayName = email;
            try {
                var payload = JSON.parse(atob(token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/')));
                displayName = payload.Name || payload.Email || email;
            } catch (_) {}

            sessionStorage.setItem('adminToken', token);
            sessionStorage.setItem('adminRefreshToken', refreshToken || '');
            sessionStorage.setItem('adminUser', displayName);

            window.location.href = 'CustomerRoadmap.html';

        } catch (err) {
            showError('Cannot reach the server. Check your connection or API URL.');
        } finally {
            btn.disabled = false;
            btn.innerHTML = 'Sign In';
        }
    }

    function showError(msg) {
        var el = document.getElementById('loginMsg');
        el.className = 'msg error';
        el.textContent = msg;
    }

    function showLocked(msg) {
        var el = document.getElementById('loginMsg');
        el.className = 'msg locked';
        el.textContent = '&#128274; ' + msg;
    }
</script>
</body>
</html>
